name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      # Next.js (inlined at build time)
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_APP_NAME: Healthcare SaaS
      # API (only needed if a step loads ConfigModule; harmless for lint/build)
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci
      JWT_SECRET: ci-jwt-secret
      JWT_REFRESH_SECRET: ci-jwt-refresh-secret
      STRIPE_SECRET_KEY: sk_test_ci
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter api exec eslint "src/**/*.ts" "test/**/*.ts" --max-warnings 0

      - name: Lint Web
        run: pnpm --filter web exec eslint .

      - name: Run API tests
        run: pnpm --filter api test

      - name: Build Web
        run: pnpm --filter web build

      - name: Build API
        run: pnpm --filter api build
