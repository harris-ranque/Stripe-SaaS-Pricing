services:
  # =====================================
  # NGINX
  # =====================================
  nginx:
    image: nginx:stable-alpine

    ports:
      - '80:80'

    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend

  # =====================================
  # FRONTEND
  # =====================================
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Healthcare SaaS}

    environment:
      NODE_ENV: production

    expose:
      - '3000'

  # =====================================
  # BACKEND
  # =====================================
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile

    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CONNECT_WEBHOOK_SECRET: ${STRIPE_CONNECT_WEBHOOK_SECRET:-}
      STRIPE_PLATFORM_FEE_PERCENT: ${STRIPE_PLATFORM_FEE_PERCENT:-10}
      STRIPE_STARTER_PRICE_ID: ${STRIPE_STARTER_PRICE_ID:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost/api/auth/google/callback}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}

    expose:
      - '3001'

    depends_on:
      - postgres
      - redis

  # =====================================
  # REDIS
  # =====================================
  redis:
    image: redis:7-alpine

    ports:
      - '6379:6379'

  # =====================================
  # POSTGRES
  # =====================================
  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

      POSTGRES_DB: healthcare_saas

    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data
  # =====================================
  # PROMETHEUS
  # =====================================
  prometheus:
    image: prom/prometheus

    ports:
      - '9090:9090'

    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  # =====================================
  # GRAFANA
  # =====================================
  grafana:
    image: grafana/grafana

    ports:
      - '3002:3000'

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  postgres_data: