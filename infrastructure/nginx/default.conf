# Toggles `Connection: upgrade` only when the client actually requests it,
# otherwise sends `Connection: close`. Required for proper WebSocket proxying
# without leaking the upgrade header on plain HTTP requests.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # =====================================
    # SECURITY HEADERS (apply to all responses, including errors)
    # =====================================
    add_header X-Frame-Options          DENY                              always;
    add_header X-Content-Type-Options   nosniff                           always;
    add_header Referrer-Policy          no-referrer                       always;
    add_header Permissions-Policy       "camera=(), microphone=()"        always;

    # =====================================
    # BACKEND API
    # NestJS uses setGlobalPrefix('api'), so /api/health -> backend:/api/health
    # =====================================
    location /api/ {
        proxy_pass http://backend:3001;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # =====================================
    # WEBSOCKETS (Socket.IO)
    # =====================================
    location /socket.io/ {
        proxy_pass http://backend:3001;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-lived sockets — keep them open
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # =====================================
    # FRONTEND (Next.js)
    # Last because nginx picks the longest prefix match, but readable order.
    # =====================================
    location / {
        proxy_pass http://frontend:3000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HMR / dev WS support; in prod $connection_upgrade evaluates to `close`
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
